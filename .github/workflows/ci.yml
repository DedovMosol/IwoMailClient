name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Отменяем предыдущий запуск того же ref при новом пуше (экономия runner-минут)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide easter-egg audio placeholder (real file is copyrighted & gitignored)
        run: |
          mkdir -p app/src/main/res/raw
          [ -f app/src/main/res/raw/pashalka_iwo.m4a ] || printf 'placeholder' > app/src/main/res/raw/pashalka_iwo.m4a

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Generate coverage report
        run: ./gradlew koverXmlReportDebug --stacktrace

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./app/build/reports/kover/reportDebug.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/kover/

  build:
    name: Assemble release (R8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide easter-egg audio placeholder (real file is copyrighted & gitignored)
        run: |
          mkdir -p app/src/main/res/raw
          [ -f app/src/main/res/raw/pashalka_iwo.m4a ] || printf 'placeholder' > app/src/main/res/raw/pashalka_iwo.m4a

      - name: Assemble release APK (minified with R8)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide easter-egg audio placeholder (real file is copyrighted & gitignored)
        run: |
          mkdir -p app/src/main/res/raw
          [ -f app/src/main/res/raw/pashalka_iwo.m4a ] || printf 'placeholder' > app/src/main/res/raw/pashalka_iwo.m4a

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.*
